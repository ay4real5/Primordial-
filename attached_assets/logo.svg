<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <title>Primordial Health Services LLC</title>
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Icon: rounded square background -->
  <rect x="4" y="4" width="72" height="72" rx="18" fill="url(#iconGrad)"/>

  <!-- Heart shape inside square -->
  <path d="M40 57 C40 57 18 44 18 30 C18 22 26 17 33 22 C36 24 39 28 40 31 C41 28 44 24 47 22 C54 17 62 22 62 30 C62 44 40 57 40 57Z"
    fill="white" opacity="0.95"/>

  <!-- ECG pulse line across heart -->
  <path d="M22 35 L28 35 L31 27 L36 43 L39 32 L42 38 L45 35 L58 35"
    fill="none" stroke="url(#heartGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brand name -->
  <text x="90" y="35"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="28" font-weight="800" fill="#0f172a" letter-spacing="1">Primordial</text>

  <!-- Tagline -->
  <text x="91" y="56"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="13" font-weight="500" fill="#0d9488" letter-spacing="3">HEALTH SERVICES</text>

  <!-- LLC pill -->
  <rect x="91" y="63" width="28" height="13" rx="4" fill="#0d9488" opacity="0.15"/>
  <text x="105" y="73"
    text-anchor="middle"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="8" font-weight="700" fill="#0d9488" letter-spacing="1">LLC</text>
</svg>
